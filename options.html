<!DOCTYPE html>
<html>
<head>
  <title>Piracy Report Options</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; width: 450px; }
    h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; color: #ce0e2d; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px;}
    input[type="text"] { 
      width: 100%; 
      padding: 8px; 
      box-sizing: border-box;
      border: 1px solid #ccc; 
      border-radius: 4px;
    }
    button {
      background-color: #ce0e2d;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    button:hover { background-color: #b00c26; }
    #status { margin-top: 10px; color: green; font-weight: bold; height: 20px; }
  </style>
</head>
<body>

  <h2>FloSports Extension Setup</h2>

  <div class="form-group">
    <label for="piracy_folder_id">Root Google Drive Folder ID:</label>
    <input type="text" id="piracy_folder_id" placeholder="Paste the ID here (e.g., 15J7gor-Z1mW...)">
    <div style="font-size: 11px; color: #666; margin-top: 4px;">
      This folder must contain 'events_config.json' and is where PDFs are saved.
    </div>
  </div>

  <div class="form-group">
    <label for="piracy_sheet_id">Report Log Sheet ID (Foundation Sheet):</label>
    <input type="text" id="piracy_sheet_id" placeholder="Paste the Spreadsheet ID here">
  </div>

  <div class="form-group">
    <label for="event_sheet_id">Event Config & Whitelist Sheet ID:</label>
    <input type="text" id="event_sheet_id" placeholder="Paste the Spreadsheet ID here">
    <div style="font-size: 11px; color: #666; margin-top: 4px;">
      Required for Dynamic URLs and the "Handles White List" check.
    </div>
  </div>

  <button id="save">Save Settings</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
