<!DOCTYPE html>
<html>
<head>
  <title>Piracy Report Options</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; width: 450px; background-color: #f9fafb; color: #111827; }
    h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; color: #ce0e2d; margin-top: 0; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px;}
    input[type="text"] { 
      width: 100%; 
      padding: 10px; 
      box-sizing: border-box;
      border: 1px solid #d1d5db; 
      border-radius: 6px;
      background-color: white;
    }
    .lab-section { 
      margin-top: 25px; 
      border: 1px solid #fcd34d; 
      background-color: #fffbeb; 
      padding: 15px; 
      border-radius: 8px;
    }
    .lab-title { color: #b45309; font-weight: 800; font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .lab-instructions { font-size: 11px; color: #92400e; line-height: 1.4; margin-bottom: 12px; font-style: italic; }
    .highlight-card {
      background: white;
      border: 1px solid #e5e7eb;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
    }
    .highlight-user { font-weight: bold; color: #ce0e2d; font-size: 13px; }
    .highlight-desc { font-size: 11px; color: #4b5563; margin-top: 2px; }
    
    button {
      background-color: #ce0e2d;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      width: 100%;
      margin-top: 10px;
    }
    button:hover { background-color: #b00c26; }
    #status { margin-top: 10px; text-align: center; font-weight: bold; height: 20px; }
  </style>
</head>
<body>

  <h2>FloSports Setup</h2>

  <div class="form-group">
    <label for="piracy_folder_id">Root Google Drive Folder ID:</label>
    <input type="text" id="piracy_folder_id" placeholder="Paste Folder ID here">
  </div>

  <div class="form-group">
    <label for="piracy_sheet_id">Foundation Sheet ID:</label>
    <input type="text" id="piracy_sheet_id" placeholder="Paste Spreadsheet ID here">
  </div>

  <div class="form-group">
    <label for="event_sheet_id">Event Config Sheet ID:</label>
    <input type="text" id="event_sheet_id" placeholder="Paste Spreadsheet ID here">
  </div>

  <div class="lab-section">
    <div class="lab-title"> The Lab (Community & Beta)</div>
    <div id="lab-instructions" class="lab-instructions">Loading community guidelines...</div>
    
    <label style="font-weight: normal; font-size: 13px; display: flex; align-items: flex-start; gap: 10px; cursor: pointer;">
        <input type="checkbox" id="beta_opt_in" style="width: auto; margin-top: 3px;">
        <span>Enable Experimental Scrapers (Rumble, Discord)<br><small style="color:#666;">Opting in grants you the <strong>Pioneer Badge</strong>.</small></span>
    </label>

    <div style="margin-top: 15px; font-weight: bold; font-size: 12px; color: #b45309;"> Highlight of the Week:</div>
    <div class="highlight-card" id="highlight-card">
        <div class="highlight-user" id="highlight-user">Fetching...</div>
        <div class="highlight-desc" id="highlight-desc">...</div>
    </div>
  </div>

  <div class="lab-section" style="margin-top: 15px; border-color: #93c5fd; background-color: #eff6ff;">
    <div class="lab-title" style="color: #1e3a8a;"> Feedback & Suggestions</div>
    <div class="lab-instructions" style="color: #1e40af;">This box is for suggestions, bugs, errors, or problems. Your feedback helps us improve the tool!</div>
    <textarea id="suggestion_text" maxlength="1000" rows="4" placeholder="Type your feedback here... (Max 1,000 characters)" style="width: 100%; padding: 10px; border: 1px solid #bfdbfe; border-radius: 6px; resize: vertical; font-family: inherit; font-size: 13px; box-sizing: border-box;"></textarea>
    <button id="send_suggestion" style="background-color: #2563eb; margin-top: 10px;">Send Suggestion</button>
    <div id="suggestion_status" style="margin-top: 10px; text-align: center; font-size: 12px; font-weight: bold; height: 16px;"></div>
  </div>

  <button id="save">Save All Settings</button>
  <div id="status"></div>

  <script src="options.js" type="module"></script>
</body>
</html>
