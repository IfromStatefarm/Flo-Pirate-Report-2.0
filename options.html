<!DOCTYPE html>
<html lang="en">
<head>
  <title>Pirate Hunter Command Center</title>
  <link rel="stylesheet" href="options_style.css">
</head>
<body class="command-deck">
  <div class="radar-container">
    <div class="radar-sweep"></div>
  </div>
  <div class="sea-fog"></div>

  <div class="deck-wrapper">
    <header>
      <img src="FloReporter_logo.png" class="logo-porthole" alt="Flo Logo">
      <h1>Pirate Hunter Command</h1>
    </header>

    <div class="card basic-card">
      <label for="piracy_folder_id">📦 Evidence Vault (Root Folder ID)</label>
      <input type="text" id="piracy_folder_id" class="porthole-input" placeholder="Paste Folder ID here">
    </div>

    <div class="themed-card log-card">
      <div class="image-container">
        <img src="foundationsheet.jpg" alt="Foundation Sheet">
        <input type="text" id="piracy_sheet_id" class="overlay-input foundation-input" placeholder="Enter Spreadsheet ID">
      </div>
    </div>

    <div class="themed-card config-card">
        <div class="image-container">
          <img src="eventconfig.jpg" alt="Event Config">
          <input type="text" id="event_sheet_id" class="overlay-input config-input" placeholder="Enter Spreadsheet ID">
        </div>
    </div>

    <div class="card basic-card">
        <label for="report_mode">🧭 Navigation Mode</label>
        <select id="report_mode" class="porthole-input">
          <option value="scout">Scout Mode (Log Only)</option>
          <option value="all">Full Takedown Mode</option>
        </select>
    </div>

    <div class="bounty-board">
        <div class="bounty-header">⚠️ WANTED: PIRATE STREAMS</div>
        <div id="lab-instructions" class="bounty-desc">Loading community guidelines...</div>
        
        <label class="pioneer-toggle">
            <input type="checkbox" id="beta_opt_in">
            <span class="wanted-poster">
                <strong>Enable Experimental Scrapers</strong>
                <small>Grants Pioneer Badge 🚀</small>
            </span>
        </label>

        <div class="highlight-card" id="highlight-card">
            <div class="highlight-user" id="highlight-user">Fetching MVP...</div>
            <div class="highlight-desc" id="highlight-desc">...</div>
        </div>
    </div>

    <button id="save" class="btn-enforce">COMMIT TO LOGS</button>
    <div id="status"></div>
  </div>

  <div id="enforce-stamp" class="stamp">ENFORCED</div>

  <script src="options.js" type="module"></script>
  <script src="clippy.js"></script>
</body>
</html>
